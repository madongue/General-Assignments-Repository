version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-diplomax}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-diplomax}:${POSTGRES_PASSWORD}@db:5432/diplomax
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DEBUG=false
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MASTER_AES_KEY_HEX=${MASTER_AES_KEY_HEX}
      - DEFAULT_ICT_ADMIN_PASSWORD=${DEFAULT_ICT_ADMIN_PASSWORD}
      - DEFAULT_STUDENT_PASSWORD=${DEFAULT_STUDENT_PASSWORD}
      - MTN_MOMO_SUBSCRIPTION_KEY=${MTN_MOMO_SUBSCRIPTION_KEY}
      - MTN_MOMO_API_USER=${MTN_MOMO_API_USER}
      - MTN_MOMO_API_KEY=${MTN_MOMO_API_KEY}
      - MTN_MOMO_ENVIRONMENT=production
      - ORANGE_MONEY_CLIENT_ID=${ORANGE_MONEY_CLIENT_ID}
      - ORANGE_MONEY_CLIENT_SECRET=${ORANGE_MONEY_CLIENT_SECRET}
      - ORANGE_MONEY_MERCHANT_KEY=${ORANGE_MONEY_MERCHANT_KEY}
      - FABRIC_GATEWAY_URL=http://fabric-gateway:8080
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-credentials.json
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    volumes:
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro
      - ./backend/google-credentials.json:/app/google-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - diplomax

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: diplomax
      POSTGRES_USER: ${POSTGRES_USER:-diplomax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diplomax"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - diplomax

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - diplomax

  # ── Celery Worker (payment polling, background tasks) ──────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q payments,blockchain
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-diplomax}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-diplomax}:${POSTGRES_PASSWORD}@db:5432/diplomax
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - diplomax

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - diplomax

volumes:
  pgdata:
  redisdata:

networks:
  diplomax:
    driver: bridge
