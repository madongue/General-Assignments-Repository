name: diplomax_recruiter
description: Diplomax CM — Recruiter Verification Portal (Web + Mobile)
publish_to: none
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  go_router: ^13.0.0
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  mobile_scanner: ^5.1.0    # Real QR camera scanner
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  intl: 0.20.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Web support
