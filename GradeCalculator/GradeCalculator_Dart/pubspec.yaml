name: grade_calculator
description: A Student Grade Calculator Mobile Application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.1
  excel: ^4.0.2
  pdf: ^3.10.7
  printing: ^5.11.1
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  share_plus: ^12.0.1
  sqflite_common_ffi: ^2.4.0+2

  sqflite_common_ffi_web: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
